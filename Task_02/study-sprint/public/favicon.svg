<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1E2130" stroke="#C97A1D" stroke-width="2"/>
  <!-- Timer outline -->
  <circle cx="16" cy="17" r="8" stroke="#E8A23D" stroke-width="2" fill="none"/>
  <!-- Clock hands -->
  <line x1="16" y1="17" x2="16" y2="11" stroke="#E8A23D" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="17" x2="20" y2="19" stroke="#C97A1D" stroke-width="2" stroke-linecap="round"/>
  <!-- Crown / top nub -->
  <rect x="14" y="7" width="4" height="2" rx="1" fill="#E8A23D"/>
  <!-- Accent dot -->
  <circle cx="16" cy="17" r="1.5" fill="#E8A23D"/>
</svg>