<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Card — Starter (has bugs)</title>
<style>

    display: flex;
    align-items: center;
  }

  .card {
    width: 300px;
    height: 320px;
    background: #ffffff;
    border: 2px solid #dfe1e6;
    border-radius: 16px; /* BUG: should be 16px per spec */
    padding: 24px;
    box-sizing: border-box;
    text-align: center; /* BUG: should be centered */
  }

  .avatar {
    width: 90px;
    height: 90px;
    background: #0f3460;
    border-radius: 50%; /* BUG: should be 50% to make it a circle */
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 22px;
    margin: 0 auto 10px auto;
  }

  .name {
    font-size: 22px;
    font-weight: bold;

  }

    font-size: 15px;
    color: #6e6e78;
    margin: 0 0 12px 0;
  }

  /* BUG: divider class exists but is never applied in the HTML below */ /*now added*/
  .divider {
    border: none;
    border-top: 1px solid #dfe1e6;
    margin: 24px 0;
  }

  .btn {
    display: block;
    width: 180px;
    height: 44px;
    line-height: 44px;
    text-align: center;
    background: #533483; /* BUG: wrong shade, spec wants #533483 */
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    margin: 20px auto 0 auto;
    cursor: pointer;
    /* BUG: no :hover state defined below */

  .btn:hover {

}

  <div class="card">
